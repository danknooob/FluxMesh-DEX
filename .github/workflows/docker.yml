name: Docker

on:
  push:
    branches: [main, master]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: api
          - service: gateway
            image: gateway
          - service: matching-engine
            image: matching-engine
          - service: indexer
            image: indexer
          - service: settlement
            image: settlement
          - service: notification
            image: notification
          - service: eventlog
            image: eventlog
          - service: mcp
            image: mcp
          - service: frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Go version
        id: go_version
        run: |
          # 1) Fetch latest from go.dev; 2) fallback to .go-version (updated by update-go-version workflow); 3) fallback to 1.25
          V=$(curl -sL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')
          if [ -z "$V" ]; then
            V=$(cat .go-version 2>/dev/null | tr -d '[:space:]')
            [ -z "$V" ] && V="1.25"
            echo "Network fallback: using .go-version or default -> $V"
          else
            echo "Using latest from go.dev: $V"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fluxmesh-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ steps.go_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
