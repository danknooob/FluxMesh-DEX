name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-go:
    name: Lint Go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, gateway, matching-engine, indexer, settlement, notification, eventlog, mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Go version
        id: go
        run: |
          # 1) Fetch latest from go.dev; 2) fallback to .go-version (updated by update-go-version workflow); 3) fallback to 1.25
          V=$(curl -sL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')
          if [ -z "$V" ]; then
            V=$(cat .go-version 2>/dev/null | tr -d '[:space:]')
            [ -z "$V" ] && V="1.25"
            echo "Network fallback: using .go-version or default -> $V"
          else
            echo "Using latest from go.dev: $V"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go.outputs.version }}

      - name: Download deps
        env:
          GOWORK: off
        run: |
          cd "${{ matrix.service }}"
          go mod download

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build and lint
        env:
          GOWORK: off
        run: |
          cd "${{ matrix.service }}"
          go mod download
          go build -o /dev/null ./...
          golangci-lint run ./...

  test-go:
    name: Test Go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, gateway, matching-engine, indexer, settlement, notification, eventlog, mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Go version
        id: go
        run: |
          # 1) Fetch latest from go.dev; 2) fallback to .go-version (updated by update-go-version workflow); 3) fallback to 1.25
          V=$(curl -sL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/^go//')
          if [ -z "$V" ]; then
            V=$(cat .go-version 2>/dev/null | tr -d '[:space:]')
            [ -z "$V" ] && V="1.25"
            echo "Network fallback: using .go-version or default -> $V"
          else
            echo "Using latest from go.dev: $V"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go.outputs.version }}

      - name: Download deps
        run: go mod download
        working-directory: ${{ matrix.service }}

      - name: Test
        run: go test ./... -count=1 -race -short
        working-directory: ${{ matrix.service }}

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
