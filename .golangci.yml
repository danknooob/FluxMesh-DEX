# Shared config for all Go services. Run from each service dir (api, gateway, mcp, etc.)
version: 2

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt

linters-settings:
  govet:
    enable-all: true
